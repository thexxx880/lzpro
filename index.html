<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LzPlayer PRO • Biblioteca</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --primary: #00d4ff;
    --bg: #0f0f0f;
    --card: #1a1a1a;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
nav { background: #111; padding: 18px 0; border-bottom: 1px solid #222; }
.nav-content { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.logo { font-size: 26px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; }
.hero { text-align: center; padding: 50px 20px 30px; }
.hero h1 { font-size: 38px; margin: 0 0 10px; }
.add-section { background: var(--card); border-radius: 16px; padding: 30px; margin-bottom: 30px; border: 1px solid #222; }
.search-box { display: flex; gap: 12px; margin-bottom: 20px; }
.search-box input { flex: 1; padding: 14px 20px; border: 2px solid #333; border-radius: 12px; background: #111; color: #fff; font-size: 16px; }
.search-box button { padding: 0 30px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
.search-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
.search-card { background: #111; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform .2s; border: 1px solid #222; }
.search-card:hover { transform: translateY(-4px); }
.search-card img { width: 100%; height: 200px; object-fit: cover; }
.add-form { margin-top: 25px; padding-top: 25px; border-top: 1px solid #333; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
@media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
.input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.input-group label { font-size: 13px; color: #aaa; }
.input-group input { padding: 12px 16px; border: 2px solid #333; border-radius: 10px; background: #111; color: #fff; font-size: 15px; }
.btn-primary { background: var(--primary); color: #000; border: none; padding: 14px 32px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 200; }
.modal.show { display: flex; }
.modal-content { background: #1a1a1a; border-radius: 16px; width: 100%; max-width: 480px; padding: 30px; border: 1px solid #333; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 14px 28px; border-radius: 50px; display: none; z-index: 300; }
.toast.show { display: flex; }
</style>
</head>
<body>
<nav>
    <div class="nav-content">
        <div class="logo"><i class="fas fa-play-circle"></i> <span>LzPlayer <strong>PRO</strong></span></div>
    </div>
</nav>
<div class="container">
    <div class="hero">
        <h1>Agregar nuevo contenido</h1>
        <p>Busca en TMDB o agrega manualmente tus enlaces de video</p>
    </div>
    <!-- AGREGAR CONTENIDO -->
    <div class="add-section">
        <h2><i class="fas fa-plus-circle" style="color:var(--primary)"></i> Agregar contenido</h2>
       
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Buscar película en TMDB..." onkeyup="if (event.key === 'Enter') searchTMDB()">
            <button onclick="searchTMDB()"><i class="fas fa-search"></i> Buscar</button>
        </div>
        <div id="search-results" class="search-results"></div>
        <div class="add-form">
            <h3>O agregar manualmente</h3>
            <div class="form-row">
                <div class="input-group">
                    <label>Título</label>
                    <input type="text" id="manual-title" placeholder="Nombre de la película">
                </div>
                <div class="input-group">
                    <label>URL del Backdrop / Poster</label>
                    <input type="text" id="manual-poster" placeholder="https://image.tmdb.org/...">
                </div>
            </div>
            <div class="input-group">
                <label>URL del Video (.m3u8 recomendado)</label>
                <input type="text" id="manual-video" placeholder="https://tu-servidor.com/video.m3u8">
            </div>
            <button class="btn-primary" onclick="addManualContent()">Guardar y generar URL</button>
        </div>
    </div>
    <!-- URL GENERADA (para copiar) -->
    <div id="generated-url-box" style="display:none; background:#1f2a2f; border:2px solid #00d4ff; border-radius:14px; padding:22px 26px; margin-bottom:40px;">
        <p style="margin:0 0 12px; color:#00d4ff; font-weight:700; font-size:15px;">
            <i class="fas fa-link"></i> URL lista para usar / compartir:
        </p>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <input type="text" id="generated-url" readonly
                   style="flex:1; min-width:280px; padding:13px 16px; background:#111; border:1px solid #444; border-radius:10px; color:#fff; font-size:14px; font-family:monospace;">
            <button onclick="copyGeneratedUrl()"
                    style="padding:13px 26px; background:#00d4ff; color:#000; border:none; border-radius:10px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; white-space:nowrap;">
                <i class="fas fa-copy"></i> <span>Copiar URL</span>
            </button>
        </div>
        <small style="color:#777; display:block; margin-top:10px;">Esta URL abre directamente el reproductor con el video.</small>
    </div>
</div>
<!-- Modal -->
<div id="add-modal" class="modal">
    <div class="modal-content">
        <h3>Agregar a la biblioteca</h3>
        <div style="display:flex; gap:18px; margin-bottom:20px;">
            <img id="modal-poster" style="width:90px; height:130px; object-fit:cover; border-radius:10px;">
            <div>
                <h4 id="modal-title" style="margin:0 0 8px;"></h4>
                <p id="modal-year" style="color:#aaa; margin:0;"></p>
            </div>
        </div>
        <div class="input-group">
            <label>URL del Video (obligatorio)</label>
            <input type="text" id="modal-video-url" placeholder="https://...m3u8">
        </div>
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; padding:14px; background:#333; color:#fff; border:none; border-radius:10px;">Cancelar</button>
            <button onclick="confirmAddFromSearch()" style="flex:1; padding:14px; background:var(--primary); color:#000; border:none; border-radius:10px; font-weight:700;">Agregar</button>
        </div>
    </div>
</div>
<div id="toast" class="toast"><i class="fas fa-check-circle" style="color:#00d4ff"></i> <span id="toast-text"></span></div>
<script>
const TMDB_API_KEY = "38e497c6c1a043d1341416e80915669f";
let currentSearchResult = null;
function showToast(msg) {
    const toast = document.getElementById("toast");
    document.getElementById("toast-text").textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2600);
}
async function searchTMDB() {
    const q = document.getElementById("search-input").value.trim();
    if (!q) return;
    const container = document.getElementById("search-results");
    container.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:20px;color:#666;">Buscando...</div>`;
   
    try {
        const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(q)}&language=es-MX`);
        const data = await res.json();
        container.innerHTML = "";
        if (!data.results?.length) { container.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#888;">Sin resultados</div>`; return; }
       
        data.results.slice(0,10).forEach(m => {
            const card = document.createElement("div");
            card.className = "search-card";
            const poster = m.poster_path ? `https://image.tmdb.org/t/p/w342${m.poster_path}` : "https://via.placeholder.com/342x513/222/555?text=Sin+imagen";
            card.innerHTML = `<img src="${poster}"><div style="padding:10px 12px;"><div style="font-weight:600;font-size:14px;">${m.title}</div><div style="color:#888;font-size:12px;">${m.release_date?.substring(0,4) || ""}</div></div>`;
            card.onclick = () => openAddModal(m);
            container.appendChild(card);
        });
    } catch { container.innerHTML = `<div style="color:#e63946;text-align:center;">Error al buscar</div>`; }
}
function openAddModal(movie) {
    currentSearchResult = movie;
    document.getElementById("modal-title").textContent = movie.title;
    document.getElementById("modal-year").textContent = movie.release_date ? `Año: ${movie.release_date.substring(0,4)}` : "";
    document.getElementById("modal-poster").src = movie.poster_path ? `https://image.tmdb.org/t/p/w342${movie.poster_path}` : "https://via.placeholder.com/342x513/222/555?text=Sin+imagen";
    document.getElementById("modal-video-url").value = "";
    document.getElementById("add-modal").classList.add("show");
}
function closeModal() {
    document.getElementById("add-modal").classList.remove("show");
}
function confirmAddFromSearch() {
    if (!currentSearchResult) return;
    const url = document.getElementById("modal-video-url").value.trim();
    if (!url) return alert("Ingresa la URL del video");
   
    const backdrop = currentSearchResult.backdrop_path
        ? `https://image.tmdb.org/t/p/original${currentSearchResult.backdrop_path}`
        : currentSearchResult.poster_path ? `https://image.tmdb.org/t/p/original${currentSearchResult.poster_path}` : "";
   
    const item = { title: currentSearchResult.title, backdrop, videoUrl: url };
    
    closeModal();
    showToast("¡Agregado! URL generada abajo");
    showGeneratedUrl(item.videoUrl, item.backdrop, item.title);
   
    document.getElementById("search-input").value = "";
    document.getElementById("search-results").innerHTML = "";
}
function addManualContent() {
    const title = document.getElementById("manual-title").value.trim();
    const poster = document.getElementById("manual-poster").value.trim();
    const videoUrl = document.getElementById("manual-video").value.trim();
    if (!title || !videoUrl) return alert("Título y URL del video son obligatorios");
    
    document.getElementById("manual-title").value = "";
    document.getElementById("manual-poster").value = "";
    document.getElementById("manual-video").value = "";
    showToast("Contenido agregado. URL generada abajo");
    showGeneratedUrl(videoUrl, poster, title);
}
// ==================== GENERAR Y COPIAR URL ====================
function generatePlayerUrl(videoUrl, poster, title) {
    const base = window.location.origin + window.location.pathname.replace("index.html", "player.html");
    const params = new URLSearchParams();
    params.set("video", videoUrl);
    if (poster) params.set("poster", poster);
    if (title) params.set("title", title);
    return `${base}?${params.toString()}`;
}
function showGeneratedUrl(videoUrl, poster, title) {
    const box = document.getElementById("generated-url-box");
    const input = document.getElementById("generated-url");
    input.value = generatePlayerUrl(videoUrl, poster, title);
    box.style.display = "block";
    setTimeout(() => box.scrollIntoView({ behavior: "smooth", block: "center" }), 300);
}
function copyGeneratedUrl() {
    const input = document.getElementById("generated-url");
    input.select();
    navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.querySelector("#generated-url-box button");
        if (btn) {
            const original = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-check"></i> Copiado`;
            setTimeout(() => btn.innerHTML = original, 1800);
        }
    }).catch(() => {
        document.execCommand("copy");
        alert("URL copiada");
    });
}
document.getElementById("add-modal").addEventListener("click", e => { if (e.target.id === "add-modal") closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
</body>
</html>
