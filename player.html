<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LzPlayer PRO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root { --primary: #00d4ff; }
body {
    margin: 0; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden;
}
#player {
    position: relative; width: 100%; height: 100vh; background: #000; overflow: hidden;
}
#backdrop-overlay {
    position: absolute; inset: 0; z-index: 1;
    background-size: cover; background-position: center; transition: opacity 0.6s ease;
}
video {
    width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2;
    opacity: 0; transition: opacity 0.6s ease;
}
.controls {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: space-between; padding: 25px 30px;
    background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 40%);
    z-index: 3; transition: opacity 0.4s ease;
}
.controls.hide { opacity: 0; pointer-events: none; }
.top {
    color: #fff; font-size: 22px; font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: space-between;
}
.top-left {
    display: flex;
    align-items: center;
    gap: 12px;
}
.center { display: flex; justify-content: center; align-items: center; gap: 40px; }

/* === BOTONES CON ANIMACIÓN === */
.btn {
    color: #fff;
    font-size: 26px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    user-select: none;
}

.btn:hover {
    color: var(--primary);
    transform: scale(1.15);
}

.btn:active {
    transform: scale(0.9);
}

/* Botón grande de Play/Pause */
.btn.big {
    font-size: 68px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                color 0.2s ease;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}

.btn.big:hover {
    transform: scale(1.15);
    color: var(--primary);
}

.btn.big:active {
    transform: scale(0.85);
}

/* === ANIMACIÓN DE GIRO MÁS FUERTE === */
.btn.rotate {
    animation: rotateIcon 0.45s ease forwards;
}

@keyframes rotateIcon {
    0%   { transform: rotate(0deg) scale(1); }
    40%  { transform: rotate(var(--rotate-deg)) scale(1.15); }
    100% { transform: rotate(0deg) scale(1); }
}

/* === ANIMACIÓN PLAY/PAUSA === */
#playBtn {
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), 
                color 0.2s ease,
                opacity 0.2s ease;
}

#playBtn.changing {
    transform: scale(0.7);
    opacity: 0.6;
}

/* Engranaje girando */
#settingsBtn.rotating {
    animation: rotateCog 0.5s ease forwards;
}

@keyframes rotateCog {
    from { transform: rotate(0deg); }
    to   { transform: rotate(180deg); }
}

.bottom { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    color: #fff; 
    position: relative;
}

/* === PREVIEW DE MINIATURA (SOLO HOVER) === */
.seek-container {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
}

#seek {
    flex: 1;
    cursor: pointer;
    accent-color: var(--primary);
}

/* Contenedor de la miniatura */
.seek-preview {
    position: absolute;
    bottom: 45px;
    left: 0;
    background: #111;
    border: 2px solid #333;
    border-radius: 8px;
    padding: 6px;
    display: none;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 25px rgba(0,0,0,0.7);
}

.seek-preview.show {
    display: block;
}

.seek-preview canvas {
    width: 160px;
    height: 90px;
    border-radius: 4px;
    background: #000;
    display: block;
}

.seek-preview .time-label {
    text-align: center;
    font-size: 12px;
    color: #ccc;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
}

.bottom span { 
    font-size: 13px; 
    font-variant-numeric: tabular-nums; 
    min-width: 60px; 
    text-align: center; 
}

/* MENÚ CONFIGURACIÓN */
.settings-menu {
    position: absolute; bottom: 75px; right: 30px;
    background: rgba(20,20,20,0.95); border-radius: 12px; padding: 12px 0;
    min-width: 240px; box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1); z-index: 10; display: none; flex-direction: column;
}
.settings-menu.show { display: flex; }
.settings-header { padding: 8px 18px; font-size: 14px; font-weight: 600; color: #aaa; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 6px; }
.quality-option {
    padding: 11px 18px; font-size: 14px; color: #fff; cursor: pointer;
    transition: all 0.2s ease;
    display: flex; align-items: center; gap: 10px;
}
.quality-option:hover { 
    background: rgba(255,255,255,0.08); 
    transform: translateX(4px);
}
.quality-option.active { 
    color: var(--primary); 
    font-weight: 600; 
    background: rgba(0, 212, 255, 0.1);
}
.quality-option .check { margin-left: auto; color: var(--primary); }
.quality-option .recommended {
    font-size: 11px; background: var(--primary); color: #000; padding: 1px 7px;
    border-radius: 10px; margin-left: 8px; font-weight: 600;
}

/* LOADER */
.quality-loader {
    position: absolute; inset: 0; z-index: 5;
    background: rgba(0,0,0,0.7);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; gap: 14px;
}
.quality-loader.show { display: flex; }
.spinner {
    width: 46px; height: 46px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MODAL REANUDAR */
.resume-modal {
    position: absolute; inset: 0; z-index: 10;
    background: rgba(0,0,0,0.85);
    display: none; align-items: center; justify-content: center;
}
.resume-modal.show { display: flex; }
.resume-content {
    background: #1a1a1a;
    padding: 30px 35px;
    border-radius: 16px;
    text-align: center;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}
.resume-content p {
    color: #fff;
    font-size: 17px;
    margin-bottom: 25px;
    line-height: 1.4;
}
.resume-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}
.resume-buttons button {
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
#btn-continue {
    background: var(--primary);
    color: #000;
}
#btn-continue:hover {
    background: #00e5ff;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
}
#btn-continue:active {
    transform: scale(0.95);
}
#btn-restart {
    background: #333;
    color: #fff;
}
#btn-restart:hover {
    background: #444;
    transform: translateY(-2px);
}
#btn-restart:active {
    transform: scale(0.95);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .btn.big { font-size: 48px; } 
    .btn { font-size: 22px; } 
    .top { font-size: 17px; }
    .controls { padding: 18px 20px; }
    .settings-menu { right: 20px; min-width: 210px; }
    .resume-content { margin: 0 15px; padding: 25px; }
    .seek-preview canvas { width: 120px; height: 68px; }
}
</style>
</head>
<body>
<div id="player">
    <div id="backdrop-overlay"></div>
    <video id="video" playsinline></video>
 
    <!-- Video oculto solo para generar miniaturas (NO afecta la reproducción) -->
    <video id="preview-video" style="display:none;" playsinline></video>
 
    <div id="quality-loader" class="quality-loader">
        <div class="spinner"></div>
        <span>Cambiando calidad...</span>
    </div>
  
    <div class="controls" id="controls">
        <div class="top" id="title">
            <div class="top-left">
                <span id="title-text">Cargando...</span>
            </div>
        </div>
      
        <div class="center">
            <i class="fas fa-rotate-left btn" id="rewindBtn" onclick="rewind()"></i>
            <i class="fas fa-play btn big" id="playBtn" onclick="togglePlay()"></i>
            <i class="fas fa-rotate-right btn" id="forwardBtn" onclick="forward()"></i>
        </div>
      
        <div class="bottom">
            <span id="current">00:00:00</span>
            
            <!-- Contenedor de la barra con preview -->
            <div class="seek-container">
                <input type="range" id="seek" value="0" min="0" max="100" step="0.1">
                
                <!-- Miniatura de preview -->
                <div id="seek-preview" class="seek-preview">
                    <canvas id="preview-canvas" width="160" height="90"></canvas>
                    <div class="time-label" id="preview-time">00:00</div>
                </div>
            </div>
            
            <span id="total">00:00:00</span>
            <i class="fas fa-cog btn" id="settingsBtn" title="Configuración"></i>
            <i class="fas fa-expand btn" onclick="fullscreen()" title="Pantalla completa"></i>
        </div>
    </div>
  
    <div id="settings-menu" class="settings-menu">
        <div class="settings-header">Calidad de video</div>
        <div id="quality-options"></div>
    </div>
  
    <!-- MODAL REANUDAR -->
    <div id="resume-modal" class="resume-modal">
        <div class="resume-content">
            <p id="resume-text">Te quedaste en 00:00:00.<br>¿Quieres continuar desde ahí?</p>
            <div class="resume-buttons">
                <button id="btn-continue">Sí, continuar</button>
                <button id="btn-restart">No, empezar desde el principio</button>
            </div>
        </div>
    </div>
</div>

<script>
const video = document.getElementById("video");
const previewVideo = document.getElementById("preview-video"); // Video oculto para preview
const playBtn = document.getElementById("playBtn");
const rewindBtn = document.getElementById("rewindBtn");
const forwardBtn = document.getElementById("forwardBtn");
const controls = document.getElementById("controls");
const seek = document.getElementById("seek");
const titleEl = document.getElementById("title-text");
const currentTimeEl = document.getElementById("current");
const totalTimeEl = document.getElementById("total");
const backdropOverlay = document.getElementById("backdrop-overlay");
const settingsBtn = document.getElementById("settingsBtn");
const settingsMenu = document.getElementById("settings-menu");
const qualityContainer = document.getElementById("quality-options");
const qualityLoader = document.getElementById("quality-loader");
const resumeModal = document.getElementById("resume-modal");
const resumeText = document.getElementById("resume-text");
const btnContinue = document.getElementById("btn-continue");
const btnRestart = document.getElementById("btn-restart");

// Elementos del preview
const seekPreview = document.getElementById("seek-preview");
const previewCanvas = document.getElementById("preview-canvas");
const previewTimeEl = document.getElementById("preview-time");
const ctx = previewCanvas.getContext("2d", { alpha: false });

const params = new URLSearchParams(window.location.search);
let VIDEO_URL = params.get('video') ? decodeURIComponent(params.get('video')) : '';
let POSTER_URL = params.get('poster') ? decodeURIComponent(params.get('poster')) : '';
let TITLE = params.get('title') ? decodeURIComponent(params.get('title')) : 'Reproduciendo';

const STORAGE_KEY = `lzplayer_resume_${btoa(VIDEO_URL || 'unknown').replace(/[^a-zA-Z0-9]/g, '').slice(0, 50)}`;

let hlsInstance = null;
let hasStarted = false;
let isChangingQuality = false;
let saveInterval = null;
let previewTimeout = null;

function formatTime(seconds) {
    if (!seconds || isNaN(seconds)) return "00:00:00";
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    return `${h}:${m < 10 ? "0" + m : m}:${s < 10 ? "0" + s : s}`;
}

function updateTotalTime() {
    if (video.duration && !isNaN(video.duration)) {
        totalTimeEl.textContent = formatTime(video.duration);
    }
}

function saveProgress() {
    if (video.currentTime > 5 && VIDEO_URL) {
        localStorage.setItem(STORAGE_KEY, video.currentTime);
    }
}

function loadSavedProgress() {
    if (!VIDEO_URL) return;
    const savedTime = parseFloat(localStorage.getItem(STORAGE_KEY));
    if (savedTime && savedTime > 10) {
        resumeText.innerHTML = `Te quedaste en <strong>${formatTime(savedTime)}</strong>.<br>¿Quieres continuar desde ahí?`;
        resumeModal.classList.add("show");
        btnContinue.onclick = () => {
            video.currentTime = savedTime;
            resumeModal.classList.remove("show");
            hideBackdropAndShowVideo();
            hasStarted = true;
            video.play();
        };
        btnRestart.onclick = () => {
            localStorage.removeItem(STORAGE_KEY);
            resumeModal.classList.remove("show");
            hideBackdropAndShowVideo();
            hasStarted = true;
            video.play();
        };
    }
}

function loadMetadata() {
    titleEl.textContent = TITLE || "Reproduciendo";
    if (POSTER_URL) {
        backdropOverlay.style.backgroundImage =
            `linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('${POSTER_URL}')`;
    } else {
        backdropOverlay.style.background = '#111';
    }
    if (VIDEO_URL) {
        loadVideo(VIDEO_URL);
    } else {
        titleEl.textContent = "Error: No se proporcionó URL de video";
        alert("No se encontró el enlace del video en la URL.");
    }
}

function loadVideo(url) {
    // Cargar el video principal
    if (url.includes(".m3u8") && Hls.isSupported()) {
        hlsInstance = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 90
        });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        
        // También cargar en el video de preview (para generar miniaturas)
        const hlsPreview = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 30
        });
        hlsPreview.loadSource(url);
        hlsPreview.attachMedia(previewVideo);
    } else {
        video.src = url;
        previewVideo.src = url; // Cargar también en el preview
    }
}

video.addEventListener("waiting", () => {
    if (isChangingQuality) qualityLoader.classList.add("show");
});
video.addEventListener("playing", () => {
    if (isChangingQuality) {
        qualityLoader.classList.remove("show");
        isChangingQuality = false;
    }
});

video.addEventListener("timeupdate", () => {
    if (!saveInterval && video.duration) {
        saveInterval = setInterval(saveProgress, 1000);
    }
});

function hideBackdropAndShowVideo() {
    if (backdropOverlay) {
        backdropOverlay.style.transition = "opacity 0.6s ease";
        backdropOverlay.style.opacity = "0";
        setTimeout(() => {
            if (backdropOverlay) backdropOverlay.style.display = "none";
        }, 600);
    }
    video.style.transition = "opacity 0.6s ease";
    video.style.opacity = "1";
}

/* === REWIND CON GIRO MÁS FUERTE === */
function rewind() {
    video.currentTime = Math.max(0, video.currentTime - 10);
    
    rewindBtn.style.setProperty('--rotate-deg', '-55deg');
    rewindBtn.classList.add('rotate');
    
    setTimeout(() => {
        rewindBtn.classList.remove('rotate');
    }, 450);
}

/* === FORWARD CON GIRO MÁS FUERTE === */
function forward() {
    video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
    
    forwardBtn.style.setProperty('--rotate-deg', '55deg');
    forwardBtn.classList.add('rotate');
    
    setTimeout(() => {
        forwardBtn.classList.remove('rotate');
    }, 450);
}

/* === PLAY/PAUSA CON TRANSICIÓN SUAVE === */
function togglePlay() {
    if (video.paused) {
        if (!hasStarted) {
            hideBackdropAndShowVideo();
            hasStarted = true;
        }
        
        playBtn.classList.add('changing');
        setTimeout(() => {
            playBtn.classList.remove('changing');
            playBtn.className = "fas fa-pause btn big";
        }, 120);
        
        video.play().catch(() => {});
    } else {
        playBtn.classList.add('changing');
        setTimeout(() => {
            playBtn.classList.remove('changing');
            playBtn.className = "fas fa-play btn big";
        }, 120);
        
        video.pause();
    }
}

function fullscreen() {
    const el = document.getElementById("player");
    if (!document.fullscreenElement) {
        el.requestFullscreen?.().catch(() => {});
    } else {
        document.exitFullscreen?.();
    }
}

/* === ENGRANAJE QUE GIRA === */
settingsBtn.addEventListener("click", (e) => {
    e.stopImmediatePropagation();
    
    settingsBtn.classList.add('rotating');
    setTimeout(() => {
        settingsBtn.classList.remove('rotating');
    }, 500);
    
    settingsMenu.classList.toggle("show");
    
    if (settingsMenu.classList.contains("show") && hlsInstance) {
        loadQualityOptions();
    }
});

document.addEventListener("click", (e) => {
    if (!settingsMenu.contains(e.target) && e.target !== settingsBtn) {
        settingsMenu.classList.remove("show");
    }
});

/* === PREVIEW DE MINIATURA SOLO AL PASAR EL CURSOR (NO AFECTA EL VIDEO) === */
let previewDebounce = null;

seek.addEventListener("mousemove", (e) => {
    if (!video.duration || previewVideo.readyState < 2) return;

    const rect = seek.getBoundingClientRect();
    const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const hoverTime = percent * video.duration;

    // Mostrar preview
    seekPreview.style.display = "block";
    seekPreview.classList.add("show");

    // Posicionar la miniatura
    const previewWidth = seekPreview.offsetWidth;
    let leftPos = e.clientX - rect.left - (previewWidth / 2);
    leftPos = Math.max(0, Math.min(leftPos, rect.width - previewWidth));
    seekPreview.style.left = `${leftPos}px`;

    // Mostrar el tiempo
    previewTimeEl.textContent = formatTime(hoverTime);

    // Generar miniatura (sin tocar el video principal)
    clearTimeout(previewDebounce);
    previewDebounce = setTimeout(() => {
        generatePreviewThumbnail(hoverTime);
    }, 60);
});

seek.addEventListener("mouseleave", () => {
    seekPreview.classList.remove("show");
    setTimeout(() => {
        if (!seekPreview.classList.contains("show")) {
            seekPreview.style.display = "none";
        }
    }, 180);
});

// Generar miniatura usando el video oculto (NO afecta la reproducción principal)
function generatePreviewThumbnail(time) {
    if (!previewVideo.duration || previewVideo.readyState < 2) return;

    const originalTime = previewVideo.currentTime;

    // Ir al tiempo deseado en el video de preview (oculto)
    previewVideo.currentTime = time;

    // Esperar a que cargue el frame y capturarlo
    setTimeout(() => {
        try {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
            ctx.drawImage(previewVideo, 0, 0, previewCanvas.width, previewCanvas.height);
        } catch (e) {
            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
        }
    }, 50);
}

function loadQualityOptions() {
    qualityContainer.innerHTML = "";
    if (!hlsInstance || !hlsInstance.levels.length) {
        qualityContainer.innerHTML = `<div class="quality-option">No hay calidades disponibles</div>`;
        return;
    }
    let bestLevelIndex = 0;
    let maxHeight = 0;
    hlsInstance.levels.forEach((level, i) => {
        if (level.height > maxHeight) {
            maxHeight = level.height;
            bestLevelIndex = i;
        }
    });
    const autoOption = createQualityOption("Auto (Recomendado)", -1, hlsInstance.currentLevel === -1);
    qualityContainer.appendChild(autoOption);
  
    const sortedLevels = [...hlsInstance.levels]
        .map((level, index) => ({...level, originalIndex: index}))
        .sort((a, b) => b.height - a.height);
  
    sortedLevels.forEach((level) => {
        const label = `${level.height}p`;
        const isActive = hlsInstance.currentLevel === level.originalIndex;
        const isRecommended = level.originalIndex === bestLevelIndex;
        const option = createQualityOption(label, level.originalIndex, isActive, isRecommended);
        qualityContainer.appendChild(option);
    });
}

function createQualityOption(label, levelIndex, isActive, isRecommended = false) {
    const div = document.createElement("div");
    div.className = `quality-option ${isActive ? "active" : ""}`;
    let html = label;
    if (isRecommended) html += `<span class="recommended">Recomendada</span>`;
    if (isActive) html += `<i class="fas fa-check check"></i>`;
    div.innerHTML = html;
  
    div.addEventListener("click", () => {
        if (!hlsInstance) return;
        isChangingQuality = true;
        qualityLoader.classList.add("show");
        settingsMenu.classList.remove("show");
        hlsInstance.currentLevel = levelIndex;
        setTimeout(() => {
            if (isChangingQuality) {
                qualityLoader.classList.remove("show");
                isChangingQuality = false;
            }
        }, 12000);
    });
    return div;
}

/* EVENTOS DEL VIDEO */
video.addEventListener("play", () => {
    playBtn.className = "fas fa-pause btn big";
});

video.addEventListener("pause", () => {
    playBtn.className = "fas fa-play btn big";
});

video.addEventListener("timeupdate", () => {
    const c = video.currentTime;
    const t = video.duration;
    if (!isNaN(t) && t > 0) {
        seek.value = (c / t) * 100;
        currentTimeEl.textContent = formatTime(c);
    }
});

// Solo cambia el tiempo cuando el usuario hace clic o arrastra la barra
seek.addEventListener("input", () => {
    if (video.duration) video.currentTime = (seek.value / 100) * video.duration;
});

/* ATAJOS DE TECLADO */
document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    if (e.code === "Space") { e.preventDefault(); togglePlay(); }
    if (e.code === "ArrowLeft") rewind();
    if (e.code === "ArrowRight") forward();
    if (e.code === "KeyF") fullscreen();
    if (e.code === "Escape" && document.fullscreenElement) {
        document.exitFullscreen();
    }
});

/* AUTO OCULTAR CONTROLES */
let hideTimeout;
function showControls(fast = false) {
    controls.classList.remove("hide");
    clearTimeout(hideTimeout);
    const delay = fast ? 900 : 3500;
    hideTimeout = setTimeout(() => {
        if (!video.paused) controls.classList.add("hide");
    }, delay);
}
document.addEventListener("mousemove", () => showControls(false));
document.addEventListener("touchstart", (e) => {
    if (e.target.tagName === "VIDEO" || e.target.id === "player") {
        showControls(true);
    } else {
        showControls(false);
    }
});
video.addEventListener("click", togglePlay);

let lastTapTime = 0;
video.addEventListener("dblclick", () => {
    fullscreen();
});
video.addEventListener("touchend", (e) => {
    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastTapTime;
    if (tapLength < 350 && tapLength > 0) {
        e.preventDefault();
        fullscreen();
    }
    lastTapTime = currentTime;
});

/* INICIALIZACIÓN */
function initPlayer() {
    loadMetadata();
    video.addEventListener("loadedmetadata", () => {
        updateTotalTime();
        loadSavedProgress();
    });
    video.addEventListener("durationchange", updateTotalTime);
    if (video.duration) updateTotalTime();
}
initPlayer();
</script>
